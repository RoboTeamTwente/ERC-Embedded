[platformio]
default_envs = driving_board
src_dir = .
lib_dir = lib


[extra]
common_lib_deps = Nanopb

[env]
platform = ststm32
framework = stm32cube
custom_nanopb_options = --error-on-unmatched
test_build_src = True


[env:driving_board]
board = nucleo_h753zi
build_src_filter = +<src/${this.__env__}/**/*.c>
    +<components/common/*/${this.__env__}/**/*.c>
    +<components/common/*.c>
    +<components/driving_board/**>
    -<components/driving_board/firmware/Drivers/**>
    +<components/driving_board/firmware/Drivers/BSP/**>
custom_nanopb_protos = +<proto/${this.__env__}.proto>
    +<proto/common.proto>
test_filter = driving_board/*
lib_deps = ${extra.common_lib_deps}
build_flags=
	-I components/common/logging/inc
	-I components/common/logging
	-I components/common/pb_message
	-I components/common/networking_constants
	-I components/common/result
	-I components/driving_board
	-I components/driving_board/motor
	-I components/driving_board/calculator
	-I components/driving_board/firmware
	-I components/driving_board/firmware/Middlewares
	-I components/driving_board/firmware/Middlewares/Third_Party
	-I components/driving_board/firmware/Middlewares/Third_Party/FreeRTOS
	-I components/driving_board/firmware/Middlewares/Third_Party/FreeRTOS/Source
	-I components/driving_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/include
	-I components/driving_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable
	-I components/driving_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable/MemMang
	-I components/driving_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable/GCC
	-I components/driving_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM4F
	-I components/driving_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2
	-I components/driving_board/firmware/Core
	-I components/driving_board/firmware/Core/Src
	-I components/driving_board/firmware/Core/Inc
	-I components/driving_board/simulink
	-I components/driving_board/parser
	-I components/driving_board/firmware/Drivers/BSP
	-I components/driving_board/firmware/Drivers/BSP/STM32H7xx_Nucleo
	-mthumb
	-mfpu=fpv4-sp-d16
	-mfloat-abi=softfp
	-Wl,-u,_printf_float
	-D CONFIG_LOG_LEVEL=LOG_INFO
	-DUSE_PWR_LDO_SUPPLY 
	-DUSE_NUCLEO_64 
	-DUSE_HAL_DRIVER 
	-DSTM32H753xx 
	-DSTM32_THREAD_SAFE_STRATEGY=4
