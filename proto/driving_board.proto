syntax = "proto3";
// used to wrap a message 
message PBMessageEnvelope {
    // identifier format:
    // |--------|---------------------------|
    // |board_id|   message_identifier      |
    // | 8 bits |   27 bits (3 bytes)       |
    // |--------|---------------------------|
    // Reserved Identifiers: 0xXX0000: sending types (see below)
    // Reserved Identifiers: 0xXX0001: receiving types (see below)
    // Reserved Identifiers: 0xXX0002: diagnostics
    int32 identifier = 1;
    bytes data = 2;
}

// ---------  HANDSHAKE MESSAGES ----------

// Used to identify all messages this node can send
message PBBroadcastSendingTypes {
// Identifiers: all others are 3byte long identifiers (lenght has to be 3*x)
  bytes identifiers = 1;
}

// Used to identify all messages this node can receive
message PBBroadcastingReceivingTypes {
  // Identifiers: others are 4byte long identifiers including sender id and message id (length has to be 4*x)
  bytes identifiers = 1;
}
message DrivingBoardMotorProgress {
  float distance_left = 1;
}message DrivingBoardMotorInformationDebug {
  float motor_id = 1;
  float current = 2;
  float rpm = 3;
  float back_emf = 4;
  }message DrivingBoardDiagnostics {
  enum State {
      IDLE = 0;
      OPERATING = 1;
      ERROR = 2;
      }

  State state = 1;
    repeated DrivingBoardMotorInformation motors = 2;//fix back to manual motors
}
message DrivingBoardMotorMsg {
  float voltage = 1;
  float angle_of_body_frame = 2;
  float angular_momentum = 3;
  float current = 4;
  float rpm = 5;
  float distance_to_go = 6;
  float steering_angle = 7;
}