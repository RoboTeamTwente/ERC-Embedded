syntax = "proto3";

import "common.proto";

message PHSensorInformation {
  float ph_value = 1;
  float voltage = 2;
  float temperature_compensated_ph = 3;
  SensorState state = 4;
  string error_message = 5; // Description of error if state is SENSOR_ERROR
                            // NOTE: Same as in IMU dont use strings for error messages, just make descriptive enums
}
