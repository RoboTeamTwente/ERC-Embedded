[platformio]
default_envs = arm_board
src_dir = .
lib_dir = lib


[extra]
common_lib_deps = Nanopb
common_build_flags = -mthumb
    -mfpu=fpv4-sp-d16
    -mfloat-abi=softfp
    -Wl,-u,_printf_float
    -D CONFIG_LOG_LEVEL=LOG_INFO
common_lib_dirs = None


[env]
platform = ststm32
framework = stm32cube
custom_nanopb_options = --error-on-unmatched
test_build_src = True
[env:main_board]
board = nucleo_h753zi
lib_extra_dirs = ${extra.common_lib_dirs}
build_src_filter = +<src/${this.__env__}/**/*.c>
    -<lib/common>
    +<lib/common/*/${this.__env__}/**/*.c>
custom_nanopb_protos = +<proto/${this.__env__}.proto>
    +<proto/common.proto>
lib_deps = ${extra.common_lib_deps}
    lib/${this.__env__}/firmware
    lib/main_board/firmware
build_flags=
    -I lib/main_board
    -I lib/main_board/firmware
    -I lib/main_board/firmware/Middlewares
    -I lib/main_board/firmware/Middlewares/Third_Party
    -I lib/main_board/firmware/Middlewares/Third_Party/FreeRTOS
    -I lib/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source
    -I lib/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/include
    -I lib/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable
    -I lib/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable/MemMang
    -I lib/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable/GCC
    -I lib/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM4F
    -I lib/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2
    -I lib/main_board/firmware/Core
    -I lib/main_board/firmware/Core/Src
    -I lib/main_board/firmware/Core/Inc
    -I lib/main_board/firmware/Drivers
    -I lib/main_board/firmware/Drivers/BSP
    -I lib/main_board/firmware/Drivers/BSP/STM32H7xx_Nucleo
    -I lib/main_board/firmware/Drivers/STM32H7xx_HAL_Driver
    -I lib/main_board/firmware/Drivers/STM32H7xx_HAL_Driver/Src
    -I lib/main_board/firmware/Drivers/STM32H7xx_HAL_Driver/Inc
    -I lib/main_board/firmware/Drivers/STM32H7xx_HAL_Driver/Inc/Legacy
    -I lib/main_board/firmware/Drivers/CMSIS
    -I lib/main_board/firmware/Drivers/CMSIS/Include
    -I lib/main_board/firmware/Drivers/CMSIS/Device
    -I lib/main_board/firmware/Drivers/CMSIS/Device/ST
    -I lib/main_board/firmware/Drivers/CMSIS/Device/ST/STM32H7xx
    -I lib/main_board/firmware/Drivers/CMSIS/Device/ST/STM32H7xx/Include
    -I lib/common/logging/inc
    -I lib/common/logging/main_board
    -I lib/common/pb_message
    -I lib/common/networking_constants
    -I lib/common/result
    -I lib/main_board/firmware
    -mthumb
    -mfpu=fpv4-sp-d16
    -mfloat-abi=softfp
    -Wl,-u,_printf_float
    -D CONFIG_LOG_LEVEL=LOG_INFO

[env:test_main_board]
platform = native
framework = 
lib_extra_dirs = ${extra.common_lib_dirs}
    lib/main_board
build_src_filter = -<src/>
    +<lib/common/*>
    -<lib/common/*/*>
    +<lib/common/*/test/*>
test_filter = main_board/*
build_flags=
    -I lib/common/logging/inc
    -I lib/common/logging/test
    -I lib/common/pb_message
    -I lib/common/networking_constants
    -I lib/common/result
    -I lib/main_board/firmware
[env:driving_board]
