[platformio]
default_envs = driving_board
lib_dir = lib

[extra]
common_lib_deps =
    Nanopb
commonb_build_flags =
    -mthumb
    -mfpu=fpv4-sp-d16 
    -mfloat-abi=softfp
    -Wl,-u,_printf_float
    -D CONFIG_LOG_LEVEL=LOG_INFO
common_lib_dirs = 
    lib/common
; Common config
[env]
platform = ststm32
framework = stm32cube

custom_nanopb_options =
    --error-on-unmatched

test_build_src = yes

[env:driving_board]
board = nucleo_h753zi

lib_extra_dirs =
    ${extra.common_lib_dirs}
    lib/${this.__env__}

build_src_filter =
    +<${this.__env__}/**/*.c>

custom_nanopb_protos =
    +<proto/${this.__env__}.proto>

lib_deps =
    ${extra.common_lib_deps}
    lib/${this.__env__}/firmware


#NOTE: The paths in the build_flags must be hard coded as there is no preprocessing done before being passed to the compiler
build_flags =
    -mthumb
    -mfpu=fpv4-sp-d16 
    -mfloat-abi=softfp
    -Wl,-u,_printf_float
    -D CONFIG_LOG_LEVEL=LOG_INFO
    -I lib/driving_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM7/r0p1
    -I lib/driving_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2
    -I lib/driving_board/firmware/Core/Inc
    -I lib/driving_board/firmware/Drivers/BSP/STM32H7xx_Nucleo
    -I lib/driving_board/firmware/Drivers/STM32H7xx_HAL_Driver/Inc
    -I lib/driving_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/include

[env:driving_board_native]
platform = native
framework = 
build_src_filter = -<src/>

test_filter = driving_board/*

# This is the correct way to include all libraries from specific folders.
# The LDF will automatically scan these directories and find any valid
# libraries inside (like 'calculator', 'logging', etc.).
lib_extra_dirs =
    lib/common
    lib/driving_board

[env:main_board]
board = nucleo_h753zi
lib_extra_dirs =
    ${extra.common_lib_dirs}
    lib/${this.__env__}

build_src_filter =
    +<${this.__env__}/**/*.c>

custom_nanopb_protos =
    +<proto/${this.__env__}.proto>

lib_deps =
    ${extra.common_lib_deps}
    lib/${this.__env__}/firmware


#NOTE: The paths in the build_flags must be hard coded as there is no preprocessing done before being passed to the compiler
build_flags =
    -mthumb
    -mfpu=fpv4-sp-d16 
    -mfloat-abi=softfp
    -Wl,-u,_printf_float
    -D CONFIG_LOG_LEVEL=LOG_INFO
    -I lib/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM7/r0p1
    -I lib/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2
    -I lib/main_board/firmware/Core/Inc
    -I lib/main_board/firmware/Drivers/BSP/STM32H7xx_Nucleo
    -I lib/main_board/firmware/Drivers/STM32H7xx_HAL_Driver/Inc
    -I lib/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/include
