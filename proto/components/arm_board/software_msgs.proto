syntax = "proto3";

//A message with (x,y,z) coordinates to be reused between messages
message Location {
    float x = 1;
    float y = 2;
    float z = 3;
}

//Message In: (x,y,z) coordinates for moving and rotating
message TargetMovement {
    //Movement
    Location target_location = 1;
    //Rotation
    float theta_x = 2;
    float theta_y = 3;
    float theta_z = 4;
}

message Obstructions {
    float obstructions_list = 1; //lists? //Maybe we will hardcode them (probably not)
}

//Message In: the actual positions of all the components of the arm
message ActualPositions {
    Location jaw_actual_position = 1;  
    Location base_actual_position = 2;           
    Location stepper_top_actual_position = 3;     
    Location stepper_bottom_actual_position = 4;           
    float gripper_rotation_actual_position = 5; //This is an angle
    float gripper_pitch_actual_position = 6;  //This is an angle 
}