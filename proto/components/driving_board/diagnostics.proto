message DrivingBoardDiagnostics {
  enum State {
      IDLE = 0;
      OPERATING = 1;
      ERROR = 2;
      }

  State state = 1;
    repeated DrivingBoardMotorInformation motors = 2;
}

//4 motors for turning 6 motors for moving forward
//used repeated fields for easy entry and scalability instead of
