[platformio]
default_envs = arm_board
src_dir = .
lib_dir = lib


[extra]
common_lib_deps = Nanopb

[env]
platform = ststm32
framework = stm32cube
custom_nanopb_options = --error-on-unmatched
test_build_src = True

[env:main_board]
board = nucleo_h753zi
build_src_filter = +<src/${this.__env__}/**/*.c>
    +<components/common/*/${this.__env__}/**/*.c>
    +<components/common/*/*.c>
    +<components/main_board/**>
    -<components/main_board/firmware/Drivers/**>
    +<components/main_board/firmware/Drivers/BSP/**>
custom_nanopb_protos = +<proto/${this.__env__}.proto>
    +<proto/common.proto>
lib_deps = ${extra.common_lib_deps}
test_filter = common/*
build_flags=
	-I components/common/logging/inc
	-I components/common/logging
	-I components/common/pb_message
	-I components/common/networking_constants
	-I components/common/result
	-I components/common/kv_pool
	-I components/main_board
	-I components/main_board/diagnostics
	-I components/main_board/timer
	-I components/main_board/timer/src
	-I components/main_board/timer/inc
	-I components/main_board/networking
	-I components/main_board/networking/src
	-I components/main_board/networking/inc
	-I components/main_board/firmware
	-I components/main_board/firmware/Middlewares
	-I components/main_board/firmware/Middlewares/Third_Party
	-I components/main_board/firmware/Middlewares/Third_Party/FreeRTOS
	-I components/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source
	-I components/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/include
	-I components/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable
	-I components/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable/MemMang
	-I components/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable/GCC
	-I components/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM4F
	-I components/main_board/firmware/Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2
	-I components/main_board/firmware/Core
	-I components/main_board/firmware/Core/Src
	-I components/main_board/firmware/Core/Inc
	-I components/main_board/firmware/Drivers
	-I components/main_board/firmware/Drivers/BSP
	-I components/main_board/firmware/Drivers/BSP/STM32H7xx_Nucleo
	-I components/main_board/firmware/Drivers/BSP/Components
	-I components/main_board/firmware/Drivers/BSP/Components/lan8742
	-I components/main_board/firmware/Drivers/STM32H7xx_HAL_Driver
	-I components/main_board/firmware/Drivers/STM32H7xx_HAL_Driver/Src
	-I components/main_board/firmware/Drivers/STM32H7xx_HAL_Driver/Inc
	-I components/main_board/firmware/Drivers/STM32H7xx_HAL_Driver/Inc/Legacy
	-I components/main_board/firmware/Drivers/CMSIS
	-I components/main_board/firmware/Drivers/CMSIS/Include
	-I components/main_board/firmware/Drivers/CMSIS/Device
	-I components/main_board/firmware/Drivers/CMSIS/Device/ST
	-I components/main_board/firmware/Drivers/CMSIS/Device/ST/STM32H7xx
	-I components/main_board/firmware/Drivers/CMSIS/Device/ST/STM32H7xx/Source
	-I components/main_board/firmware/Drivers/CMSIS/Device/ST/STM32H7xx/Source/Templates
	-I components/main_board/firmware/Drivers/CMSIS/Device/ST/STM32H7xx/Include
	-I components/main_board/firmware/LWIP
	-I components/main_board/firmware/LWIP/App
	-I components/main_board/firmware/LWIP/Target
	-I components/main_board/ssd1306
	-I components/main_board/ssd1306/src
	-I components/main_board/ssd1306/inc
	-I components/main_board/menu_driver
	-I components/main_board/menu_driver/src
	-I components/main_board/menu_driver/inc
	-mthumb
	-mfpu=fpv4-sp-d16
	-mfloat-abi=softfp
	-Wl,-u,_printf_float
	-D CONFIG_LOG_LEVEL=LOG_INFO
	-DUSE_PWR_LDO_SUPPLY 
	-DUSE_NUCLEO_64 
	-DUSE_HAL_DRIVER 
	-DSTM32H753xx 
	-DSTM32_THREAD_SAFE_STRATEGY=4

[env:arm_board]
board = nucleo_h753zi
board_build.stm32cube.custom_config_header = yes
build_src_filter = +<src/${this.__env__}/**/*.c>
    +<components/common/*/${this.__env__}/**/*.c>
    +<components/${this.__env__}/*>
    -<components/${this.__env__}/firmware/Drivers/*>
    +<components/${this.__env__}/firmware/Drivers/BSP/**>
