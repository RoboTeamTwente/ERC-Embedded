syntax = "proto3";

//Copy of the diagnostics for driving board
//Message Out: Arm board -> Debug, State of ONE motor
message ArmMotorInformation {
    enum State {
        IDLE = 0;
        OPERATING = 1;
        CALIBRATING = 2;
        ERROR = 3;
    }

    State state = 1;
    int32 motor_id = 2;
    float rpm = 3;
    float voltage = 4;
    float current = 5;
    float torque = 6;
    float power_consumption = 7;
    float current_rotation = 8; //Include full rotations
}

//Message Out: Arm board -> Debug, States of ALL motors
//(If im correct theres 6 on the arm + gripper)
message ArmMotorDiagnostics {
    ArmMotorInformation gripper_rotation_motor = 1; //side-to-side rotation of wrist
    ArmMotorInformation gripper_pitch_motor = 2; //up and down rotation of wrist
    ArmMotorInformation base_motor = 3;
    ArmMotorInformation top_motor = 4; //top shoulder
    ArmMotorInformation bottom_motor = 5; //bottom shoulder
    ArmMotorInformation jaw_motor = 6; //opens and closes the gripper
}

//Message Out: Arm board -> Debug, SUPER diagnostics message with all feedback/diagnostics included
message ArmDiagnostics {
    enum State {
        IDLE = 0;
        OPERATING = 1;
        CALIBRATING = 2; //Arm not available to move while calibrating
        ERRORED = 3;
    }
    State state = 1;
    ArmMotorDiagnostics motor_diagnostics = 4;
}

