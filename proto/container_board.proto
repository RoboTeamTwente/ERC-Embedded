syntax = "proto3";

message ElectromagnetMsg {
    bool actuate = 1;
}

message ServoMsg {
    bool rotate_dir = 1;
}

message LockMsg {
    ElectromagnetMsg magnet = 2;
    ServoMsg servo = 3;
}

message ScaleMsg {
    
}

; Diagnostics related messages
message ElectromagnetInformation {
    enum State {
        ACTIVE = 1;
        IDLE = 2;
        OFF = 3;
    }
    State state = 1;
    float power_consumption = 2;
    float voltage = 3;
    float current = 4;
    float field_strength = 5;
}

message ServoInformation {
    float torque = 1;
    float power_consumption = 2;
    float rpm = 3;
    float voltage = 4;
    float current = 5;
    float angle = 6;
}

message ScaleInformation {
    float power_consumption = 1;
    float voltage = 2;
    float current = 3;
}

message ContainerboardDiagnostics {
    enum State {
    IDLE = 0;
    OPERATING = 1;
    NOOP = 2;
    }

    State state = 1;
    ElectromagnetInformation magnet_information = 2;
    ServoInformation servo_information = 3;
    ScaleInformation scale_information = 4;
}